ai_tools_used:
  - "Claude"          # Architecture discussion, code review, deck writing
  - "GitHub Copilot"  # Autocomplete

ai_usage_summary: |
  Used Claude (Anthropic) for architecture discussion and reviewing scoring
  formula design choices. Used GitHub Copilot for code autocomplete.
  All scoring logic, weights, and honeypot detection rules were designed
  by the author based on reading the JD and data analysis.
  No candidate data was fed to any LLM during development or ranking.
  The ranking step itself makes zero external API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-component feature scoring with multiplicative behavioral modifier.
  No model loading — pure Python stdlib, zero external dependencies.

  Six scoring components (weights in parentheses):
    title_score (0.22)      — tiered title mapping derived from the full
                              dataset title list; Tier-1 targets are Search
                              Engineer, Recommendation Systems Engineer,
                              Applied ML Engineer, NLP Engineer, AI/ML Engineer.
    ai_exp_score (0.25)     — years of AI/ML-specific experience estimated from
                              career history titles + description content, not
                              just total YoE.
    skills_quality (0.20)   — relevant skills × proficiency level × endorsement
                              trust factor × usage duration; rewards depth over
                              keyword-stuffing breadth.
    career_content (0.22)   — term-weighted scan of career descriptions for
                              production deployment, retrieval, ranking, NDCG/MRR,
                              and vector-DB evidence. Consulting-company roles
                              receive a 0.65× recency penalty.
    trajectory (0.08)       — penalizes all-consulting backgrounds (JD explicitly
                              disqualifies); rewards product-company AI progression.
    location (0.03)         — India-based candidates get 0.95–1.00; willing-to-
                              relocate international candidates get 0.70.

  Behavioral modifier (multiplicative, range 0.25–1.30) combines:
  open_to_work flag, days since last active, recruiter response rate,
  notice period, interview completion rate, GitHub activity score,
  and saved-by-recruiters count.

  Honeypot detection fires on: timeline impossibility (total career months
  > 2.2× claimed YoE), expert skills with 0 months usage, 8+ expert skills,
  endorsements > 5× connections, multiple simultaneous current roles.

  Runtime: 33 seconds on Apple M2 CPU for 100K candidates.
  Top 100 = 100% Tier-1/2 AI titles; 87% India-based; 0 honeypots.

